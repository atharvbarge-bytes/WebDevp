
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Inference Hub</title>
<link rel="stylesheet" href="css/h1ca.css">
</head>

<body>

<header class="top-bar">
     <div class="logo-container">
        <img src="images/logo.png" alt="Logo" class="logo">
    </div>
<div class="content">
<span>Welcome to GridFlow</span>
</div>
</header>

<div class="bg-layer"></div>
<div class="overlay"></div>

<div class="main-wrapper">

<div class="hero-text">
<h1>Creativity is <br><span>limitless!!</span></h1><br>
<h1>Break out your ideas<br><span>with GridFlow!!</span></h1>
</div>

<div class="login-box">
<h2>Sign in</h2>

<form onsubmit="return checkPassword()">

<div class="input-group">
<input type="text" name="username" required autocomplete="off">
<label>Enter Your Username</label>
</div>

<div class="input-group">
<input type="password" id="password1" required>
<label>Create Password</label>
</div>

<div class="input-group">
<input type="password" id="password2" required>
<label>Confirm Your Password</label>
</div>

<div class="show-pass">
<input type="checkbox" onclick="togglePassword()"> Show Password
</div>

<p id="error" style="color:red;"></p>
<div class="btn-container">
<button type="button" class="login-btn" onclick="window.location.href='db.html'">Create an Account</button>
</div>

</form>

</div>
</div>
<script src="js/script.js"></script>
</body>
</html>
