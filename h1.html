<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridFlowdd</title>
    <link rel="stylesheet" href="h1.css">
</head>
<body>

<header class="top-bar">
    <div class="logo-container">
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="content">
        Welcome to GridFlow
    </div>
</header>

<div class="bg-layer"></div>
<div class="overlay"></div>

<div class="main-wrapper">
        
    <div class="hero-text">
        <h1>Creativity is <br><span>limitless!!</span></h1><br>
        <h1> Break out your ideas<br><span>with GridFlow!!</span></h1>
    </div>

    <div class="login-box">
        <h2>Sign in</h2>

        <form action="#" method="post">
            <div class="input-group">
                <input type="text" name="username" required autocomplete="off">
                <label>Username or Email</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <div class="btn-container">
                <button type="button" class="login-btn secondary" onclick="window.location.href='db.html'">Sign In</button>
                <button type="button" class="login-btn secondary" onclick="window.location.href='h1ca.html'">
                    Create an Account
                </button>
            </div>
        </form>
    </div>

</div>
<script>src="h1.js"</script>
</body>
</html>
