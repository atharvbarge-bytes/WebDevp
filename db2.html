<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="css/db.css">
    <!-- Added Chart.js for the revenue chart to work -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
</head>
<body>
    <div class="dashboard-container">
        
        <!-- SIDEBAR WITH UPDATED LINKS -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/logo.png" alt="Logo" class="logo">
                <h2><i>GridFlow</i></h2>
            </div>
            
            <nav>
                <a href="home.html">Home</a>
                <a href="index.html" class="active">Dashboard</a>
                <a href="screens.html">Screens</a>
                <a href="profile.html">Profile</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <!-- HEADER MOVED INSIDE MAIN CONTENT -->
            <header class="top-bar">
                <div class="page-title">Dashboard</div>
                <div class="user-controls">
                    <span class="user-profile">Hello, Ashish</span>
                    <a href="#" class="settings-link">Settings</a>
                </div>
            </header>

            <section class="stats-grid">
                <div class="card">
                    <h3>Total Sales</h3>
                    <p class="value">$24,500</p>
                    <span class="trend positive">+12%</span>
                </div>
                <div class="card">
                    <h3>Active Users</h3>
                    <p class="value">1,204</p>
                    <span class="trend positive">+5%</span>
                </div>
                <div class="card">
                    <h3>Bounce Rate</h3>
                    <p class="value">42.3%</p>
                    <span class="trend negative">-2%</span>
                </div>
            </section>

            <section class="content-grid">
                <div class="card large-card">
                    <h3>Revenue Growth</h3>
                    <!-- Replaced image with canvas for an actual chart -->
                    <canvas id="revenueChart"></canvas>
                </div>
                <div class="card small-card">
                    <h3>Recent Tasks</h3>
                    <ul class="task-list">
                        <li>Update UI</li>
                        <li>Fix Login Bug</li>
                        <li>Client Meeting</li>
                    </ul>
                </div>
            </section>
        </main>
    </div>
    
    <script src="js/db.js"></script>
</body>
</html>
